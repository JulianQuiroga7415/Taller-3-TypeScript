<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Series</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <div class="p-2 mb-3" style="background-color: #00bcd4;">
            <h4 class="text-white mb-0">📺 TV Series</h4>
        </div>

        <div class="row">
            <div class="col-md-7">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Channel</th>
                            <th>Seasons</th>
                        </tr>
                    </thead>
                    <tbody id="series-body"></tbody>
                </table>
                <p id="average"></p>
            </div>
            <div class="col-md-5" id="detail"></div>
        </div>
    </div>

   <script type="module" src="dist/main.js" defer></script>
</body>
</html>
